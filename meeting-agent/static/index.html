<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Delegate</title>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.js"></script>
  <style>
    body {
      margin: 0;
      background: #1a1a2e;
      color: #fff;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    #status { text-align: center; }
    #status h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    #state { font-size: 1.2rem; opacity: 0.7; }
    #log {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 0.75rem;
      opacity: 0.4;
    }
    .listening { color: #4ade80; }
    .speaking { color: #60a5fa; }
    .connecting { color: #facc15; }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <!-- Avatar video (full viewport, behind status overlay) -->
  <video id="avatar-video" autoplay playsinline
         style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:none;z-index:0;"></video>

  <div id="status" style="z-index:1;position:relative;">
    <h1>Claude Delegate</h1>
    <div id="state" class="connecting">Connecting...</div>
  </div>
  <div id="log"></div>

  <!-- Hidden audio element for agent responses -->
  <div id="audio-container" style="display:none;"></div>

  <script>
    const BACKEND_URL = window.location.origin;
    const stateEl = document.getElementById('state');
    const logEl = document.getElementById('log');
    const audioContainer = document.getElementById('audio-container');

    function setState(cls, text) {
      stateEl.className = cls;
      stateEl.textContent = text;
    }

    function log(msg) {
      console.log('[delegate]', msg);
      const div = document.createElement('div');
      div.textContent = `${new Date().toLocaleTimeString()} ${msg}`;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // Get room name from URL query params
    const params = new URLSearchParams(window.location.search);
    const roomName = params.get('room') || 'default-room';
    const voiceId = params.get('voice_id') || '';
    const userName = params.get('user_name') || '';
    const avatarId = params.get('avatar_id') || '';

    async function start() {
      try {
        // Step 1: Capture meeting audio
        log('Requesting microphone access...');
        const mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const audioTrack = mediaStream.getAudioTracks()[0];
        log(`Got audio track: ${audioTrack.label}`);

        // Step 2: Get LiveKit token from our server
        log(`Getting token for room: ${roomName}`);
        const tokenResp = await fetch(
          `${BACKEND_URL}/api/token?room=${encodeURIComponent(roomName)}&identity=meeting-bridge&voice_id=${encodeURIComponent(voiceId)}&user_name=${encodeURIComponent(userName)}&avatar_id=${encodeURIComponent(avatarId)}`,
          { headers: { 'ngrok-skip-browser-warning': 'true' } }
        );
        const { token, url } = await tokenResp.json();
        log(`Got token, connecting to ${url}`);

        // Step 3: Connect to LiveKit room
        const room = new LivekitClient.Room();

        room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, publication, participant) => {
          log(`Subscribed to track from ${participant.identity}: ${track.kind}`);
          if (track.kind === 'audio') {
            // Attach audio to play it — bot will stream this into the meeting
            const element = track.attach();
            audioContainer.appendChild(element);
            log('Audio attached and playing');
            setState('speaking', 'Speaking...');
          } else if (track.kind === 'video') {
            // Avatar video track — render fullscreen for Recall.ai Output Media
            const videoEl = document.getElementById('avatar-video');
            track.attach(videoEl);
            videoEl.style.display = 'block';
            document.getElementById('status').style.display = 'none';
            log(`Avatar video attached from ${participant.identity}`);
          }
        });

        room.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track) => {
          if (track.kind === 'video') {
            const videoEl = document.getElementById('avatar-video');
            track.detach(videoEl);
            videoEl.style.display = 'none';
            document.getElementById('status').style.display = '';
            log('Avatar video detached');
          } else {
            track.detach().forEach(el => el.remove());
          }
          setState('listening', 'Listening...');
        });

        room.on(LivekitClient.RoomEvent.ParticipantConnected, (participant) => {
          log(`Participant joined: ${participant.identity}`);
        });

        room.on(LivekitClient.RoomEvent.Disconnected, () => {
          log('Disconnected from room');
          setState('error', 'Disconnected');
        });

        await room.connect(url, token);
        log(`Connected to room: ${room.name}`);

        // Step 4: Publish meeting audio to LiveKit room
        await room.localParticipant.publishTrack(audioTrack, {
          source: LivekitClient.Track.Source.Microphone,
          name: 'meeting-audio',
        });
        log('Published meeting audio to LiveKit room');

        setState('listening', 'Listening...');
        log('Bridge active — waiting for agent to join...');

      } catch (e) {
        log(`Error: ${e.message}`);
        setState('error', `Error: ${e.message}`);
      }
    }

    start();
  </script>
</body>
</html>
